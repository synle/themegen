name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci || npm install --no-fund --prefer-offline

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Smoke test CLI
        run: node dist/index.js --help

      - name: Upload dist
        uses: actions/upload-artifact@v7
        with:
          name: themegen-dist
          path: dist/**
          if-no-files-found: error
