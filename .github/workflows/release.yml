name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v0.0.0'
      notes:
        description: 'Release notes (markdown)'
        required: false
        default: 'Manual release.'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci || npm install --no-fund --prefer-offline

      - name: Build
        run: npm run build

      - name: Package dist
        run: |
          mkdir -p release-artifacts
          tar -czf release-artifacts/themegen-${{ github.event.inputs.tag }}-dist.tar.gz dist/
          zip -r release-artifacts/themegen-${{ github.event.inputs.tag }}-dist.zip dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: ${{ github.event.inputs.tag }}
          body: ${{ github.event.inputs.notes }}
          files: release-artifacts/*
          draft: false
          prerelease: false
